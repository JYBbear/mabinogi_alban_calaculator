<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마비노기 알반 훈련석 실시간 계산기 (Vercel)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .control-group { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .input-box { flex: 1 1 45%; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.95em; color: #2c3e50; }
        select { width: 100%; padding: 10px; font-size: 15px; border-radius: 6px; border: 1px solid #ccc; background-color: #fafafa; }
        .calc-btn { width: 100%; padding: 12px; margin-top: 10px; font-size: 16px; border-radius: 6px; border: none; background-color: #2ecc71; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .calc-btn:hover { background-color: #27ae60; }
        .result-box { padding: 20px; border: 1px solid #ddd; border-radius: 8px; background-color: #fff; display: none; margin-top: 20px; }
        .combo-card { background: #f8f9fa; border-left: 4px solid #3498db; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .combo-card:nth-child(2) { border-left-color: #95a5a6; }
        #status-text { font-weight: bold; font-size: 0.95em; text-align: center; white-space: pre-wrap; line-height: 1.5; margin-top: 10px; min-height: 40px; }
        ul { line-height: 1.8; padding-left: 20px; margin-top: 10px; margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #2c3e50; margin-bottom: 30px;">🗡️ 알반 훈련석 최저가 조합 계산기</h1>

        <div class="control-group">
            <div class="input-box" style="flex: 1 1 100%;">
                <label>🎯 목표 보상 등급</label>
                <select id="grade-select" style="border-color: #3498db;">
                    <option value="SS">SS 등급 (190점 이상)</option>
                    <option value="S">S 등급 (130~189점)</option>
                    <option value="A">A 등급 (100~129점)</option>
                    <option value="B">B 등급 (70~99점)</option>
                </select>
            </div>
            
            <div class="input-box">
                <label>난이도 훈련석</label>
                <select id="diff-select">
                    <option value="선택 안 함">지정하지 않음</option>
                    <option value="하드 중급">하드 중급 (130점)</option>
                    <option value="하드 일반">하드 일반 (100점)</option>
                    <option value="상급">상급 (70점)</option>
                    <option value="중급">중급 (50점)</option>
                </select>
            </div>

            <div class="input-box">
                <label>인원수 훈련석</label>
                <select id="player-select">
                    <option value="선택 안 함">지정하지 않음</option>
                    <option value="4인">4인 (0점)</option>
                    <option value="6인">6인 (0점)</option>
                    <option value="무제한">무제한 (-30점)</option>
                </select>
            </div>

            <div class="input-box">
                <label>파티원 훈련석</label>
                <select id="party-select">
                    <option value="선택 안 함">지정하지 않음</option>
                    <option value="최대대미지 50%">최대대미지 50% (45점)</option>
                    <option value="생명력 50%">생명력 50% (30점)</option>
                    <option value="크리티컬 확률 50%">크리티컬 확률 50% (20점)</option>
                    <option value="생명력 70%">생명력 70% (10점)</option>
                </select>
            </div>

            <div class="input-box">
                <label>몬스터 훈련석</label>
                <select id="monster-select">
                    <option value="선택 안 함">지정하지 않음</option>
                    <option value="생명력 500%">생명력 500% (45점)</option>
                    <option value="등장 수 200%">등장 수 200% (40점)</option>
                    <option value="대미지 300%">대미지 300% (30점)</option>
                    <option value="보호 150%">보호 150% (25점)</option>
                    <option value="방어 110%">방어 110% (10점)</option>
                </select>
            </div>
        </div>

        <button class="calc-btn" onclick="startProcess()">최저가 조합 계산하기</button>
        
        <div id="status-text">대기 중...</div>

        <div class="result-box" id="result-box">
            <h3 style="margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; color: #2c3e50;">✨ 추천 조합 결과</h3>
            <div id="result-text"></div>
        </div>
    </div>

    <script>
        const STONES = {
            difficulty: [
                { name: "선택 안 함", searchName: null, score: 0, price: 0 },
                { name: "하드중급", searchName: "알반 기사단의 훈련석 [난이도-하드 중급]", score: 130, price: Infinity },
                { name: "하드일반", searchName: "알반 기사단의 훈련석 [난이도-하드 일반]", score: 100, price: Infinity },
                { name: "상급", searchName: "알반 기사단의 훈련석 [난이도-상급]", score: 70, price: Infinity },
                { name: "중급", searchName: "알반 기사단의 훈련석 [난이도-중급]", score: 50, price: Infinity }
            ],
            players: [
                { name: "선택 안 함", searchName: null, score: 0, price: 0 },
                { name: "4인", searchName: "알반 기사단의 훈련석 [훈련 인원-4인]", score: 0, price: Infinity },
                { name: "6인", searchName: "알반 기사단의 훈련석 [훈련 인원-6인]", score: 0, price: Infinity },
                { name: "무제한", searchName: "알반 기사단의 훈련석 [훈련 인원-무제한]", score: -30, price: Infinity }
            ],
            party: [
                { name: "선택 안 함", searchName: null, score: 0, price: 0 },
                { name: "최대대미지 50%", searchName: "알반 기사단의 훈련석 [파티원-최대 대미지 50%]", score: 45, price: Infinity },
                
                { name: "생명력 50%", searchName: "알반 기사단의 훈련석 [파티원-생명력 50%]", score: 30, price: Infinity },
                
                { name: "생명력 회복 속도 50%", searchName: "알반 기사단의 훈련석 [파티원-생명력 회복 속도 50%]", score: 20, price: Infinity },
                { name: "마나 회복 속도 50%", searchName: "알반 기사단의 훈련석 [파티원-마나 회복 속도 50%]", score: 20, price: Infinity },
                { name: "스태미나 회복 속도 50%", searchName: "알반 기사단의 훈련석 [파티원-스태미나 회복 속도 50%]", score: 20, price: Infinity },
                { name: "근접 스킬 대미지 50%", searchName: "알반 기사단의 훈련석 [파티원-근접 스킬 대미지 50%]", score: 20, price: Infinity },
                { name: "마법 시전 속도 50%", searchName: "알반 기사단의 훈련석 [파티원-마법 시전 속도 50%]", score: 20, price: Infinity },
                { name: "궁수 조준 속도 50%", searchName: "알반 기사단의 훈련석 [파티원-궁수 조준 속도 50%]", score: 20, price: Infinity },
                { name: "크리티컬 확률 50%", searchName: "알반 기사단의 훈련석 [파티원-크리티컬 확률 50%]", score: 20, price: Infinity },
                { name: "최대 대미지 70%", searchName: "알반 기사단의 훈련석 [파티원-최대 대미지 70%]", score: 20, price: Infinity },
                
                { name: "생명력 회복 속도 70%", searchName: "알반 기사단의 훈련석 [파티원-생명력 회복 속도 70%]", score: 10, price: Infinity },
                { name: "마나 회복 속도 70%", searchName: "알반 기사단의 훈련석 [파티원-마나 회복 속도 70%]", score: 10, price: Infinity },
                { name: "스태미나 회복 속도 70%", searchName: "알반 기사단의 훈련석 [파티원-스태미나 회복 속도 70%]", score: 10, price: Infinity },
                { name: "근접 스킬 대미지 70%", searchName: "알반 기사단의 훈련석 [파티원-근접 스킬 대미지 70%]", score: 10, price: Infinity },
                { name: "마법 시전 속도 70%", searchName: "알반 기사단의 훈련석 [파티원-마법 시전 속도 70%]", score: 10, price: Infinity },
                { name: "궁수 조준 속도 70%", searchName: "알반 기사단의 훈련석 [파티원-궁수 조준 속도 70%]", score: 10, price: Infinity },
                { name: "크리티컬 확률 70%", searchName: "알반 기사단의 훈련석 [파티원-크리티컬 확률 70%]", score: 10, price: Infinity },
                { name: "생명력 70%", searchName: "알반 기사단의 훈련석 [파티원-생명력 70%]", score: 10, price: Infinity }
            ],
            monster: [
                { name: "선택 안 함", searchName: null, score: 0, price: 0 },
                { name: "생명력 500%", searchName: "알반 기사단의 훈련석 [몬스터-생명력 500%]", score: 45, price: Infinity },
                { name: "대미지 500%", searchName: "알반 기사단의 훈련석 [몬스터-대미지 500%]", score: 45, price: Infinity },

                { name: "등장 수 200%", searchName: "알반 기사단의 훈련석 [몬스터-등장 수 200%]", score: 40, price: Infinity },

                { name: "생명력 300%", searchName: "알반 기사단의 훈련석 [몬스터-생명력 300%]", score: 30, price: Infinity },
                { name: "대미지 300%", searchName: "알반 기사단의 훈련석 [몬스터-대미지 300%]", score: 30, price: Infinity },
                { name: "보호 150%", searchName: "알반 기사단의 훈련석 [몬스터-보호 150%]", score: 30, price: Infinity },

                { name: "방어 150%", searchName: "알반 기사단의 훈련석 [몬스터-방어 150%]", score: 25, price: Infinity },
                
                { name: "등장수 150%", searchName: "알반 기사단의 훈련석 [몬스터-등장수 150%]", score: 20, price: Infinity },
                { name: "보호 120%", searchName: "알반 기사단의 훈련석 [몬스터-보호 120%]", score: 20, price: Infinity },
                { name: "지력 200%", searchName: "알반 기사단의 훈련석 [몬스터-지력 200%]", score: 20, price: Infinity },
                { name: "행운 200%", searchName: "알반 기사단의 훈련석 [몬스터-행운 200%]", score: 20, price: Infinity },

                { name: "방어 120%", searchName: "알반 기사단의 훈련석 [몬스터-방어 120%]", score: 15, price: Infinity },
                { name: "지력 150%", searchName: "알반 기사단의 훈련석 [몬스터-지력 150%]", score: 15, price: Infinity },
                { name: "행운 150%", searchName: "알반 기사단의 훈련석 [몬스터-행운 150%]", score: 15, price: Infinity },

                { name: "생명력 150%", searchName: "알반 기사단의 훈련석 [몬스터-생명력 150%]", score: 10, price: Infinity },
                { name: "대미지 150%", searchName: "알반 기사단의 훈련석 [몬스터-대미지 150%]", score: 10, price: Infinity },
                { name: "보호 110%", searchName: "알반 기사단의 훈련석 [몬스터-보호 110%]", score: 10, price: Infinity },
                { name: "방어 110%", searchName: "알반 기사단의 훈련석 [몬스터-방어 110%]", score: 10, price: Infinity },
                { name: "지력 120%", searchName: "알반 기사단의 훈련석 [몬스터-지력 120%]", score: 10, price: Infinity },
                { name: "행운 120%", searchName: "알반 기사단의 훈련석 [몬스터-행운 120%]", score: 10, price: Infinity },
            ]
        };

        const GRADES = {
            "SS": { min: 190, max: 9999 }, "S":  { min: 130, max: 189 }, "A":  { min: 100, max: 129 }, "B":  { min: 70, max: 99 }
        };

        // 버셀 백엔드(api/auction.js)를 호출하여 최저가 가져오기
        async function fetchLowestPrice(itemName) {
            try {
                const response = await fetch(`/api/auction?itemName=${encodeURIComponent(itemName)}`);
                const data = await response.json();

                if (data.error) throw new Error(data.error);
                
                if (data.auction_item && data.auction_item.length > 0) {
                    return Math.min(...data.auction_item.map(item => item.auction_price_per_unit));
                }
                return Infinity; // 매물 없음
            } catch (error) {
                console.error(error);
                return Infinity; 
            }
        }

        async function startProcess() {
            const statusText = document.getElementById('status-text');
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'none';
            statusText.style.color = '#2980b9';
            
            // 1. 유저가 선택한 옵션들 가져오기
            const selections = {
                difficulty: document.getElementById('diff-select').value,
                players: document.getElementById('player-select').value,
                party: document.getElementById('party-select').value,
                monster: document.getElementById('monster-select').value
            };

            // 2. 검색해야 할 훈련석 목록 추려내기 (속도 최적화: 필요한 것만 검색)
            const stonesToFetch = new Set();
            for (const category in selections) {
                const selectedName = selections[category];
                if (selectedName === "선택 안 함") {
                    // 선택 안 했으면 해당 카테고리 전체 검색
                    STONES[category].forEach(s => { if(s.searchName) stonesToFetch.add(s) });
                } else {
                    // 고정했으면 해당 훈련석만 검색
                    const stone = STONES[category].find(s => s.name === selectedName);
                    if (stone && stone.searchName) stonesToFetch.add(stone);
                }
            }

            // 3. 가격 데이터 실시간 수집 (버셀 서버 활용)
            let fetchedCount = 0;
            const totalToFetch = stonesToFetch.size;

            for (const stone of stonesToFetch) {
                fetchedCount++;
                statusText.innerText = `🔄 경매장 조회 중... (${fetchedCount}/${totalToFetch})\n[ ${stone.name} ]`;
                stone.price = await fetchLowestPrice(stone.searchName);
                await new Promise(r => setTimeout(r, 100)); // API 호출 부하 방지용 짧은 대기
            }

            statusText.innerText = '✅ 모든 가격 실시간 조회 완료!';
            statusText.style.color = '#27ae60';
            
            // 4. 최적의 조합 계산
            calculateBestCombinations(selections);
            resultBox.style.display = 'block';
        }

        function calculateBestCombinations(selections) {
            const targetGradeKey = document.getElementById('grade-select').value;
            const targetScoreRange = GRADES[targetGradeKey];
            
            // 고정한 카테고리는 해당 훈련석만, 아니면 전체 배열을 사용
            const validDiffs = selections.difficulty === "선택 안 함" ? STONES.difficulty : STONES.difficulty.filter(s => s.name === selections.difficulty);
            const validPlayers = selections.players === "선택 안 함" ? STONES.players : STONES.players.filter(s => s.name === selections.players);
            const validPartys = selections.party === "선택 안 함" ? STONES.party : STONES.party.filter(s => s.name === selections.party);
            const validMonsters = selections.monster === "선택 안 함" ? STONES.monster : STONES.monster.filter(s => s.name === selections.monster);

            let possibleCombos = [];

            // 모든 경우의 수 계산
            for (let d of validDiffs) {
                for (let pl of validPlayers) {
                    for (let pa of validPartys) {
                        for (let m of validMonsters) {
                            let totalScore = d.score + pl.score + pa.score + m.score;
                            let totalPrice = d.price + pl.price + pa.price + m.price;

                            // 점수를 만족하고, 모든 돌의 매물이 존재하는(Infinity가 아닌) 조합만 추가
                            if (totalScore >= targetScoreRange.min && totalScore <= targetScoreRange.max && totalPrice !== Infinity) {
                                possibleCombos.push({ difficulty: d, players: pl, party: pa, monster: m, totalScore, totalPrice });
                            }
                        }
                    }
                }
            }

            // 가격 순으로 오름차순 정렬
            possibleCombos.sort((a, b) => a.totalPrice - b.totalPrice);

            // 결과 화면 출력
            const resultDiv = document.getElementById('result-text');
            const formatGold = (num) => num === 0 ? "비용 없음" : num.toLocaleString() + " G";
            
            if (possibleCombos.length === 0) {
                resultDiv.innerHTML = `<p style="color: #e74c3c; font-weight: bold; text-align: center;">현재 조건에 맞는 매물이 경매장에 부족합니다.<br>조건을 완화하거나 잠시 후 다시 시도해보세요.</p>`;
                return;
            }

            let html = '';
            // 최대 2개까지만 출력
            const maxDisplay = Math.min(possibleCombos.length, 2);
            const ranks = ["🥇 1순위 추천 조합", "🥈 2순위 추천 조합"];

            for (let i = 0; i < maxDisplay; i++) {
                const combo = possibleCombos[i];
                html += `
                    <div class="combo-card">
                        <h4 style="margin: 0 0 10px 0; color: ${i === 0 ? '#2980b9' : '#7f8c8d'};">${ranks[i]}</h4>
                        <p style="margin-top: 0; font-size: 1.05em;">
                            총 획득 점수: <strong>${combo.totalScore}점</strong><br>
                            총 예상 비용: <strong style="color: #e74c3c; font-size: 1.15em;">${formatGold(combo.totalPrice)}</strong>
                        </p>
                        <ul>
                            <li><strong>난이도:</strong> ${combo.difficulty.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.difficulty.price)})</span></li>
                            <li><strong>인원수:</strong> ${combo.players.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.players.price)})</span></li>
                            <li><strong>파티원:</strong> ${combo.party.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.party.price)})</span></li>
                            <li><strong>몬스터:</strong> ${combo.monster.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.monster.price)})</span></li>
                        </ul>
                    </div>
                `;
            }

            resultDiv.innerHTML = html;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마비노기 알반 훈련소 등급 최저가 조합 계산기</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>

    <meta name="description" content="마비노기 알반 훈련소 등급 최저가 조합 계산기. Nexon Open API 실시간 경매장 연동으로 목표 등급 최저가 훈련석 조합을 찾아보세요.">
    <meta name="keywords" content="마비노기, 알반 훈련소, 알반 훈련석, 최저가 계산기, 알반 조합, 알반 등급, 최저가 조합">

    <meta property="og:title" content="마비노기 알반 훈련석 실시간 계산기">
    <meta property="og:description" content="실시간 경매장 최저가 기반 목표 등급 훈련석 조합을 알려줍니다.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jybbear.github.io/mabinogi_alban_calaculator/">
    
    <meta name="google-site-verification" content="QP2-Drdsl21hAtIZRaIg8g8OwBT2suYTnN3WA3riOeI" />
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .site-description { text-align: center; color: #7f8c8d; line-height: 1.6; margin-top: -15px; margin-bottom: 30px; font-size: 0.95em; word-break: keep-all; }
        .control-group { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .input-box { flex: 1 1 45%; background: #fdfdfd; padding: 15px 10px; border: 1px solid #eee; border-radius: 8px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.95em; color: #2c3e50; }
        select { width: 100%; padding: 10px; font-size: 15px; }
        .calc-btn { width: 100%; padding: 12px; margin-top: 10px; font-size: 16px; border-radius: 6px; border: none; background-color: #2ecc71; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .calc-btn:hover { background-color: #27ae60; }
        .result-box { padding: 20px; border: 1px solid #ddd; border-radius: 8px; background-color: #fff; display: none; margin-top: 20px; }
        .combo-card { background: #f8f9fa; border-left: 4px solid #3498db; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        #status-text { font-weight: bold; font-size: 0.95em; text-align: center; white-space: pre-wrap; line-height: 1.5; margin-top: 10px; min-height: 40px; color: #2980b9; }
        ul { line-height: 1.8; padding-left: 20px; margin-top: 10px; margin-bottom: 0; }
        
        .select2-container .select2-selection--single { height: 38px; border: 1px solid #ccc; }
        .select2-container--default .select2-selection--single .select2-selection__rendered { line-height: 38px; }
        .select2-container--default .select2-selection--single .select2-selection__arrow { height: 36px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #2c3e50; margin-bottom: 25px;">🗡️ 알반 훈련소 최저가 조합 계산기</h1>
        
        <p class="site-description">
            Nexon Open Api를 통한 실시간 경매장 조회로<br>
            목표 보상등급을 만족하는 최저가 훈련석 조합을 알려주는 사이트입니다.<br>
            소지한 훈련석을 지정하시면 해당 훈련석이 포함된 최저가 조합을 확인 가능합니다.<br>
            <span style="font-size: 0.85em; color: #95a5a6;">(숨겨진 층 훈련석은 보상 점수에 영향을 주지 않아 제외했습니다.)</span>
        </p>

        <div class="control-group">
            <div class="input-box" style="flex: 1 1 100%; border-color: #3498db; background-color: #f4f9fc;">
                <label>🎯 목표 보상 등급</label>
                <select id="grade-select" class="simple-select">
                    <option value="SS">SS 등급 (190점 이상)</option>
                    <option value="S">S 등급 (130~189점)</option>
                    <option value="A">A 등급 (100~129점)</option>
                    <option value="B">B 등급 (70~99점)</option>
                </select>
            </div>
            
            <div class="input-box">
                <label>난이도 훈련석</label>
                <select id="diff-select" class="simple-select"></select>
            </div>

            <div class="input-box">
                <label>인원수 훈련석</label>
                <select id="player-select" class="simple-select"></select>
            </div>

            <div class="input-box">
                <label>파티원 훈련석</label>
                <select id="party-select" class="searchable-select"></select>
            </div>

            <div class="input-box">
                <label>몬스터 훈련석</label>
                <select id="monster-select" class="searchable-select"></select>
            </div>
        </div>

        <button class="calc-btn" onclick="startProcess()">최저가 조합 계산</button>
        
        <div id="status-text">데이터를 불러오는 중입니다...</div>

        <div class="result-box" id="result-box">
            <h3 style="margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; color: #2c3e50;">✨ 추천 조합 결과</h3>
            <div id="result-text"></div>
        </div>
    </div>

    <script>
        const STONES = {
            difficulty: [{ name: "선택 안 함", searchName: null, score: 0, price: 0 }],
            players: [{ name: "선택 안 함", searchName: null, score: 0, price: 0 }],
            party: [
                { name: "선택 안 함", searchName: null, score: 0, price: 0 },
                { name: "재능 수련치 150%", searchName: null, score: -30, price: 0 } 
            ],
            monster: [{ name: "선택 안 함", searchName: null, score: 0, price: 0 }]
        };

        const GRADES = {
            "SS": { min: 190, max: 9999 }, "S":  { min: 130, max: 189 }, "A":  { min: 100, max: 129 }, "B":  { min: 70, max: 99 }
        };

        async function loadItems() {
            try {
                const response = await fetch('./item.json');
                if (!response.ok) throw new Error("item.json 파일을 찾을 수 없습니다.");
                const data = await response.json();
                
                data.forEach(item => {
                    const fullName = item[0];
                    const score = parseInt(item[1], 10);

                    const match = fullName.match(/\[(.*?)-(.*?)\]/);
                    if (match) {
                        const categoryKR = match[1].trim();
                        const shortName = match[2].trim();

                        let catKey = "";
                        if (categoryKR === "난이도") catKey = "difficulty";
                        else if (categoryKR === "훈련 인원") catKey = "players";
                        else if (categoryKR === "파티원") catKey = "party";
                        else if (categoryKR === "몬스터") catKey = "monster";

                        if (catKey) {
                            STONES[catKey].push({
                                name: shortName,
                                searchName: fullName,
                                score: score,
                                price: Infinity 
                            });
                        }
                    }
                });

                buildSelectMenus();
                document.getElementById('status-text').innerText = "✅ 훈련석 데이터 로드 완료! 계산 준비 끝.";
                document.getElementById('status-text').style.color = '#27ae60';

            } catch (error) {
                document.getElementById('status-text').innerText = "❌ 에러: " + error.message;
                document.getElementById('status-text').style.color = '#c0392b';
            }
        }

        function buildSelectMenus() {
            const mapping = {
                'diff-select': 'difficulty',
                'player-select': 'players',
                'party-select': 'party',
                'monster-select': 'monster'
            };

            for (const selectId in mapping) {
                const catKey = mapping[selectId];
                const selectEl = document.getElementById(selectId);
                
                STONES[catKey].sort((a, b) => {
                    if (a.name === "선택 안 함") return -1;
                    if (b.name === "선택 안 함") return 1;
                    if (b.score !== a.score) return b.score - a.score;
                    return a.name.localeCompare(b.name, 'ko', { numeric: true });
                });

                STONES[catKey].forEach(stone => {
                    const option = document.createElement('option');
                    option.value = stone.name;
                    option.text = stone.name === "선택 안 함" ? "지정하지 않음" : `${stone.name} (${stone.score > 0 ? '+' : ''}${stone.score}점)`;
                    selectEl.appendChild(option);
                });
            }
            
            $('.simple-select').select2({
                minimumResultsForSearch: Infinity 
            });

            $('.searchable-select').select2({
                sorter: function(data) {
                    const searchTerm = $('.select2-search__field').val();
                    if (searchTerm) {
                        return data.sort(function(a, b) {
                            if (a.text === "지정하지 않음") return -1;
                            if (b.text === "지정하지 않음") return 1;
                            return a.text.localeCompare(b.text, 'ko', { numeric: true });
                        });
                    }
                    return data; 
                }
            });
        }

        async function fetchLowestPrice(itemName) {
            try {
                const response = await fetch(`https://mabinogi-alban-calaculator.vercel.app/api/search?itemName=${encodeURIComponent(itemName)}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                if (data.auction_item && data.auction_item.length > 0) {
                    return Math.min(...data.auction_item.map(item => item.auction_price_per_unit));
                }
                return Infinity; 
            } catch (error) {
                return Infinity; 
            }
        }

        async function startProcess() {
            const statusText = document.getElementById('status-text');
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'none';
            statusText.style.color = '#2980b9';
            
            const selections = {
                difficulty: document.getElementById('diff-select').value,
                players: document.getElementById('player-select').value,
                party: document.getElementById('party-select').value,
                monster: document.getElementById('monster-select').value
            };

            const stonesToFetch = new Set();
            for (const category in selections) {
                const selectedName = selections[category];
                if (selectedName === "선택 안 함") {
                    if (category === 'players') continue; 
                    STONES[category].forEach(s => { 
                        if(s.searchName && s.score >= 0) stonesToFetch.add(s);
                    });
                } else {
                    const stone = STONES[category].find(s => s.name === selectedName);
                    if (stone && stone.searchName) stonesToFetch.add(stone);
                }
            }

            statusText.innerText = `🔄 필요한 매물 가격을 조회하고 있습니다...`;

            await Promise.all(Array.from(stonesToFetch).map(async (stone) => {
                stone.price = await fetchLowestPrice(stone.searchName);
            }));

            statusText.innerText = '✅ 모든 가격 실시간 조회 완료!';
            statusText.style.color = '#27ae60';
            
            calculateBestCombinations(selections);
            resultBox.style.display = 'block';
        }

        function calculateBestCombinations(selections) {
            const targetGradeKey = document.getElementById('grade-select').value;
            const targetScoreRange = GRADES[targetGradeKey];
            
            const validDiffs = selections.difficulty !== "선택 안 함" ? STONES.difficulty.filter(s => s.name === selections.difficulty) : STONES.difficulty.filter(s => s.name === "선택 안 함" || (s.searchName && s.score >= 0 && s.price !== Infinity));
            const validPlayers = selections.players !== "선택 안 함" ? STONES.players.filter(s => s.name === selections.players) : STONES.players.filter(s => s.name === "선택 안 함");
            const validPartys = selections.party !== "선택 안 함" ? STONES.party.filter(s => s.name === selections.party) : STONES.party.filter(s => s.name === "선택 안 함" || (s.searchName && s.score >= 0 && s.price !== Infinity));
            const validMonsters = selections.monster !== "선택 안 함" ? STONES.monster.filter(s => s.name === selections.monster) : STONES.monster.filter(s => s.name === "선택 안 함" || (s.searchName && s.score >= 0 && s.price !== Infinity));

            let possibleCombos = [];

            for (let d of validDiffs) {
                for (let pl of validPlayers) {
                    for (let pa of validPartys) {
                        for (let m of validMonsters) {
                            let totalScore = d.score + pl.score + pa.score + m.score;
                            let originalPrice = d.price + pl.price + pa.price + m.price;
                            
                            let d_cost = (selections.difficulty !== "선택 안 함" && selections.difficulty === d.name) ? 0 : d.price;
                            let pl_cost = (selections.players !== "선택 안 함" && selections.players === pl.name) ? 0 : pl.price;
                            let pa_cost = (selections.party !== "선택 안 함" && selections.party === pa.name) ? 0 : pa.price;
                            let m_cost = (selections.monster !== "선택 안 함" && selections.monster === m.name) ? 0 : m.price;
                            
                            let actualCost = d_cost + pl_cost + pa_cost + m_cost;

                            if (totalScore >= targetScoreRange.min && totalScore <= targetScoreRange.max && actualCost !== Infinity) {
                                possibleCombos.push({ difficulty: d, players: pl, party: pa, monster: m, totalScore, originalPrice, actualCost });
                            }
                        }
                    }
                }
            }

            possibleCombos.sort((a, b) => {
                if (a.actualCost !== b.actualCost) return a.actualCost - b.actualCost;
                return a.originalPrice - b.originalPrice;
            });

            const resultDiv = document.getElementById('result-text');
            const formatGold = (num) => num === 0 ? "비용 없음" : num.toLocaleString() + " G";
            
            if (possibleCombos.length === 0) {
                resultDiv.innerHTML = `<p style="color: #e74c3c; font-weight: bold; text-align: center;">현재 조건에 맞는 매물이 경매장에 부족하거나 불가능한 조합입니다.<br>조건을 완화하여 다시 시도해 보세요.</p>`;
                return;
            }

            let html = '';
            const maxDisplay = Math.min(possibleCombos.length, 3);
            const ranks = ["🥇 1순위 추천 조합", "🥈 2순위 추천 조합", "🥉 3순위 추천 조합"];
            const colors = ['#2980b9', '#7f8c8d', '#cd7f32'];

            for (let i = 0; i < maxDisplay; i++) {
                const combo = possibleCombos[i];
                
                const isDOwned = selections.difficulty !== "선택 안 함" && selections.difficulty === combo.difficulty.name;
                const isPlOwned = selections.players !== "선택 안 함" && selections.players === combo.players.name;
                const isPaOwned = selections.party !== "선택 안 함" && selections.party === combo.party.name;
                const isMOwned = selections.monster !== "선택 안 함" && selections.monster === combo.monster.name;

                // 원래 가격과 실제 가격이 다를 때(즉, 소지한 훈련석이 쓰였을 때)만 문구 추가
                let extraCostInfo = "";
                if (combo.actualCost !== combo.originalPrice) {
                    extraCostInfo = `<br><span style="font-size: 0.9em; color: #7f8c8d;">(소지 훈련석 가치 포함 총 비용: ${formatGold(combo.originalPrice)})</span>`;
                }

                html += `
                    <div class="combo-card">
                        <h4 style="margin: 0 0 10px 0; color: ${colors[i]};">${ranks[i]}</h4>
                        <p style="margin-top: 0; font-size: 1.05em;">
                            총 보상 점수: <strong>${combo.totalScore}점</strong><br>
                            총 비용: <strong style="color: #e74c3c; font-size: 1.15em;">${formatGold(combo.actualCost)}</strong>${extraCostInfo}
                        </p>
                        <ul>
                            <li><strong>난이도:</strong> ${combo.difficulty.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.difficulty.price)}${isDOwned ? ' / 소지 중' : ''})</span></li>
                            <li><strong>인원수:</strong> ${combo.players.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.players.price)}${isPlOwned ? ' / 소지 중' : ''})</span></li>
                            <li><strong>파티원:</strong> ${combo.party.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.party.price)}${isPaOwned ? ' / 소지 중' : ''})</span></li>
                            <li><strong>몬스터:</strong> ${combo.monster.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.monster.price)}${isMOwned ? ' / 소지 중' : ''})</span></li>
                        </ul>
                    </div>
                `;
            }
            resultDiv.innerHTML = html;
        }

        loadItems();
    </script>
</body>
</html>

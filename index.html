<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마비노기 알반 훈련석 실시간 계산기</title>
    
    <!-- 검색 가능한 셀렉트 박스를 위한 라이브러리 (jQuery & Select2) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .control-group { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .input-box { flex: 1 1 45%; background: #fdfdfd; padding: 10px; border: 1px solid #eee; border-radius: 8px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.95em; color: #2c3e50; }
        select { width: 100%; padding: 10px; font-size: 15px; }
        .checkbox-label { display: inline-flex; align-items: center; font-size: 0.85em; color: #e67e22; margin-top: 8px; cursor: pointer; font-weight: bold; }
        .calc-btn { width: 100%; padding: 12px; margin-top: 10px; font-size: 16px; border-radius: 6px; border: none; background-color: #2ecc71; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .calc-btn:hover { background-color: #27ae60; }
        .result-box { padding: 20px; border: 1px solid #ddd; border-radius: 8px; background-color: #fff; display: none; margin-top: 20px; }
        .combo-card { background: #f8f9fa; border-left: 4px solid #3498db; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .combo-card.alt-card { border-left-color: #9b59b6; background: #faf5fa; }
        #status-text { font-weight: bold; font-size: 0.95em; text-align: center; white-space: pre-wrap; line-height: 1.5; margin-top: 10px; min-height: 40px; color: #2980b9; }
        ul { line-height: 1.8; padding-left: 20px; margin-top: 10px; margin-bottom: 0; }
        
        /* Select2 디자인 다듬기 */
        .select2-container .select2-selection--single { height: 38px; border: 1px solid #ccc; }
        .select2-container--default .select2-selection--single .select2-selection__rendered { line-height: 38px; }
        .select2-container--default .select2-selection--single .select2-selection__arrow { height: 36px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #2c3e50; margin-bottom: 30px;">🗡️ 알반 훈련석 최저가 조합기</h1>

        <div class="control-group">
            <div class="input-box" style="flex: 1 1 100%; border-color: #3498db;">
                <label>🎯 목표 보상 등급</label>
                <select id="grade-select" class="searchable-select">
                    <option value="SS">SS 등급 (190점 이상)</option>
                    <option value="S">S 등급 (130~189점)</option>
                    <option value="A">A 등급 (100~129점)</option>
                    <option value="B">B 등급 (70~99점)</option>
                </select>
            </div>
            
            <div class="input-box">
                <label>난이도 훈련석</label>
                <select id="diff-select" class="searchable-select"></select>
                <label class="checkbox-label"><input type="checkbox" id="diff-owned"> 해당 훈련석 소지 중 (0G 처리)</label>
            </div>

            <div class="input-box">
                <label>인원수 훈련석</label>
                <select id="player-select" class="searchable-select"></select>
                <label class="checkbox-label"><input type="checkbox" id="player-owned"> 해당 훈련석 소지 중 (0G 처리)</label>
            </div>

            <div class="input-box">
                <label>파티원 훈련석</label>
                <select id="party-select" class="searchable-select"></select>
                <label class="checkbox-label"><input type="checkbox" id="party-owned"> 해당 훈련석 소지 중 (0G 처리)</label>
            </div>

            <div class="input-box">
                <label>몬스터 훈련석</label>
                <select id="monster-select" class="searchable-select"></select>
                <label class="checkbox-label"><input type="checkbox" id="monster-owned"> 해당 훈련석 소지 중 (0G 처리)</label>
            </div>
        </div>

        <button class="calc-btn" onclick="startProcess()">실시간 4개 조합 계산하기</button>
        
        <div id="status-text">데이터를 불러오는 중입니다...</div>

        <div class="result-box" id="result-box">
            <h3 style="margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; color: #2c3e50;">✨ 추천 조합 결과</h3>
            <div id="result-text"></div>
        </div>
    </div>

    <script>
        const STONES = {
            difficulty: [{ name: "선택 안 함", searchName: null, score: 0, price: 0 }],
            players: [{ name: "선택 안 함", searchName: null, score: 0, price: 0 }],
            party: [
                { name: "선택 안 함", searchName: null, score: 0, price: 0 },
                { name: "재능 수련치 150%", searchName: null, score: -30, price: 0 } 
            ],
            monster: [{ name: "선택 안 함", searchName: null, score: 0, price: 0 }]
        };

        const GRADES = {
            "SS": { min: 190, max: 9999 }, "S":  { min: 130, max: 189 }, "A":  { min: 100, max: 129 }, "B":  { min: 70, max: 99 }
        };

        async function loadItems() {
            try {
                const response = await fetch('./item.json');
                if (!response.ok) throw new Error("item.json 파일을 찾을 수 없습니다.");
                const data = await response.json();
                
                data.forEach(item => {
                    const fullName = item[0];
                    const score = parseInt(item[1], 10);

                    const match = fullName.match(/\[(.*?)-(.*?)\]/);
                    if (match) {
                        const categoryKR = match[1].trim();
                        const shortName = match[2].trim();

                        let catKey = "";
                        if (categoryKR === "난이도") catKey = "difficulty";
                        else if (categoryKR === "훈련 인원") catKey = "players";
                        else if (categoryKR === "파티원") catKey = "party";
                        else if (categoryKR === "몬스터") catKey = "monster";

                        if (catKey) {
                            STONES[catKey].push({
                                name: shortName,
                                searchName: fullName,
                                score: score,
                                price: Infinity 
                            });
                        }
                    }
                });

                buildSelectMenus();
                document.getElementById('status-text').innerText = "✅ 훈련석 데이터 로드 완료! 계산 준비 끝.";
                document.getElementById('status-text').style.color = '#27ae60';

            } catch (error) {
                document.getElementById('status-text').innerText = "❌ 에러: " + error.message;
                document.getElementById('status-text').style.color = '#c0392b';
            }
        }

        function buildSelectMenus() {
            const mapping = {
                'diff-select': 'difficulty',
                'player-select': 'players',
                'party-select': 'party',
                'monster-select': 'monster'
            };

            for (const selectId in mapping) {
                const catKey = mapping[selectId];
                const selectEl = document.getElementById(selectId);
                
                STONES[catKey].forEach(stone => {
                    const option = document.createElement('option');
                    option.value = stone.name;
                    option.text = stone.name === "선택 안 함" ? "자유롭게 찾기" : `${stone.name} (${stone.score > 0 ? '+' : ''}${stone.score}점)`;
                    selectEl.appendChild(option);
                });
            }
            
            // 옵션이 다 추가된 후 Select2(검색 기능) 적용
            $('.searchable-select').select2();
        }

        async function fetchLowestPrice(itemName) {
            try {
                // api/search 로 변경 완료
                const response = await fetch(`/api/search?itemName=${encodeURIComponent(itemName)}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                if (data.auction_item && data.auction_item.length > 0) {
                    return Math.min(...data.auction_item.map(item => item.auction_price_per_unit));
                }
                return Infinity; 
            } catch (error) {
                return Infinity; 
            }
        }

        async function startProcess() {
            const statusText = document.getElementById('status-text');
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'none';
            statusText.style.color = '#2980b9';
            
            const selections = {
                difficulty: { name: document.getElementById('diff-select').value, owned: document.getElementById('diff-owned').checked },
                players: { name: document.getElementById('player-select').value, owned: document.getElementById('player-owned').checked },
                party: { name: document.getElementById('party-select').value, owned: document.getElementById('party-owned').checked },
                monster: { name: document.getElementById('monster-select').value, owned: document.getElementById('monster-owned').checked }
            };

            // 검색할 훈련석 목록 추출
            const stonesToFetch = new Set();
            for (const category in selections) {
                const sel = selections[category];
                if (sel.name === "선택 안 함") {
                    if (category === 'players') continue; // 인원수는 기본적으로 제외
                    STONES[category].forEach(s => { 
                        if(s.searchName && s.score >= 0) stonesToFetch.add(s);
                    });
                } else {
                    const stone = STONES[category].find(s => s.name === sel.name);
                    if (stone && stone.searchName) stonesToFetch.add(stone);
                    
                    // 체크박스를 했더라도 대안 조합을 위해 해당 카테고리의 전체 목록도 검색에 포함
                    if(sel.owned) {
                        STONES[category].forEach(s => { 
                            if(s.searchName && s.score >= 0) stonesToFetch.add(s);
                        });
                    }
                }
            }

            statusText.innerText = `🔄 필요한 매물 가격을 조회하고 있습니다...`;

            // 모든 훈련석 가격 실시간 병렬 조회
            await Promise.all(Array.from(stonesToFetch).map(async (stone) => {
                stone.price = await fetchLowestPrice(stone.searchName);
            }));

            statusText.innerText = '✅ 모든 가격 실시간 조회 완료!';
            statusText.style.color = '#27ae60';
            
            calculateBestCombinations(selections);
            resultBox.style.display = 'block';
        }

        function getCombos(selections, targetScoreRange, useOwned) {
            let pools = {};

            for (const category in selections) {
                const sel = selections[category];
                const allStones = STONES[category];

                if (sel.name !== "선택 안 함" && sel.owned && useOwned) {
                    // 소지 중 체크 + 소지 모드 켜짐 -> 해당 훈련석 고정 & 가격 0원 처리
                    const ownedStone = allStones.find(s => s.name === sel.name);
                    pools[category] = [{ ...ownedStone, price: 0 }];
                } else if (sel.name !== "선택 안 함" && (!sel.owned || !useOwned)) {
                    // 소지 중이 아니거나(단순 고정) or 소지 훈련석 미활용 모드 -> 해당 훈련석 고정 & 경매장 가격 적용
                    // 단, 미활용 모드(대안 찾기)일 때는 고정을 풀고 해당 카테고리 전체를 자유 탐색하게 함
                    if(!useOwned && sel.owned) {
                        pools[category] = allStones.filter(s => s.name === "선택 안 함" || (s.searchName && s.score >= 0 && s.price !== Infinity));
                    } else {
                        pools[category] = allStones.filter(s => s.name === sel.name);
                    }
                } else {
                    // 선택 안 함 상태 -> 전체 탐색
                    if(category === 'players') {
                        pools[category] = allStones.filter(s => s.name === "선택 안 함");
                    } else {
                        pools[category] = allStones.filter(s => s.name === "선택 안 함" || (s.searchName && s.score >= 0 && s.price !== Infinity));
                    }
                }
            }

            let combos = [];
            for (let d of pools.difficulty) {
                for (let pl of pools.players) {
                    for (let pa of pools.party) {
                        for (let m of pools.monster) {
                            let totalScore = d.score + pl.score + pa.score + m.score;
                            let totalPrice = d.price + pl.price + pa.price + m.price;

                            if (totalScore >= targetScoreRange.min && totalScore <= targetScoreRange.max && totalPrice !== Infinity) {
                                combos.push({ difficulty: d, players: pl, party: pa, monster: m, totalScore, totalPrice });
                            }
                        }
                    }
                }
            }
            combos.sort((a, b) => a.totalPrice - b.totalPrice);
            return combos;
        }

        function calculateBestCombinations(selections) {
            const targetGradeKey = document.getElementById('grade-select').value;
            const targetScoreRange = GRADES[targetGradeKey];
            const resultDiv = document.getElementById('result-text');
            const formatGold = (num) => num === 0 ? "비용 없음" : num.toLocaleString() + " G";

            // 체크박스를 하나라도 선택했는지 확인
            const hasAnyOwned = Object.values(selections).some(s => s.name !== "선택 안 함" && s.owned);

            // 1. 소지한 훈련석을 포함(0원)하여 계산한 최고 효율 조합
            let combosWithOwned = getCombos(selections, targetScoreRange, true);
            
            // 2. 소지한 훈련석을 일부러 쓰지 않고 경매장에서 전부 샀을 때의 조합 (대안)
            let combosWithoutOwned = hasAnyOwned ? getCombos(selections, targetScoreRange, false) : [];

            if (combosWithOwned.length === 0) {
                resultDiv.innerHTML = `<p style="color: #e74c3c; font-weight: bold; text-align: center;">현재 조건에 맞는 매물이 부족하거나 불가능한 조합입니다.</p>`;
                return;
            }

            let html = '';
            
            // [출력 1] 소지 훈련석 사용 조합 (최대 2개)
            html += `<h4 style="margin-top: 10px; color: #2c3e50;">${hasAnyOwned ? "🧳 내 훈련석을 사용한 최고 조합" : "🏆 추천 최저가 조합"}</h4>`;
            for (let i = 0; i < Math.min(combosWithOwned.length, 2); i++) {
                const combo = combosWithOwned[i];
                html += `
                    <div class="combo-card">
                        <p style="margin: 0; font-size: 1.05em;">
                            총 획득 점수: <strong>${combo.totalScore}점</strong><br>
                            총 예상 비용: <strong style="color: #e74c3c; font-size: 1.15em;">${formatGold(combo.totalPrice)}</strong>
                        </p>
                        <ul>
                            <li><strong>난이도:</strong> ${combo.difficulty.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.difficulty.price)})</span></li>
                            <li><strong>인원수:</strong> ${combo.players.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.players.price)})</span></li>
                            <li><strong>파티원:</strong> ${combo.party.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.party.price)})</span></li>
                            <li><strong>몬스터:</strong> ${combo.monster.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.monster.price)})</span></li>
                        </ul>
                    </div>
                `;
            }

            // [출력 2] 소지 훈련석을 쓰지 않았을 때의 대안 조합 (최대 2개)
            if (hasAnyOwned && combosWithoutOwned.length > 0) {
                html += `<h4 style="margin-top: 30px; color: #8e44ad;">💡 내 훈련석을 팔고 전부 구매할 때의 대안 조합</h4>`;
                for (let i = 0; i < Math.min(combosWithoutOwned.length, 2); i++) {
                    const combo = combosWithoutOwned[i];
                    html += `
                        <div class="combo-card alt-card">
                            <p style="margin: 0; font-size: 1.05em;">
                                총 획득 점수: <strong>${combo.totalScore}점</strong><br>
                                총 예상 비용: <strong style="color: #e74c3c; font-size: 1.15em;">${formatGold(combo.totalPrice)}</strong>
                            </p>
                            <ul>
                                <li><strong>난이도:</strong> ${combo.difficulty.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.difficulty.price)})</span></li>
                                <li><strong>인원수:</strong> ${combo.players.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.players.price)})</span></li>
                                <li><strong>파티원:</strong> ${combo.party.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.party.price)})</span></li>
                                <li><strong>몬스터:</strong> ${combo.monster.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(combo.monster.price)})</span></li>
                            </ul>
                        </div>
                    `;
                }
            }

            resultDiv.innerHTML = html;
        }

        loadItems();
    </script>
</body>
</html>

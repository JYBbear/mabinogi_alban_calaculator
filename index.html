<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마비노기 알반 훈련석 최저가 계산기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .result-box { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: #f9f9f9; }
        ul { line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗡️ 알반 훈련석 최저가 조합기</h1>
        <p>원하는 보상 등급을 선택하면, 경매장 최저가 기준 가장 저렴한 훈련석 조합을 알려줍니다. (현재는 테스트용 임시 가격 적용)</p>

        <div>
            <label for="grade-select"><strong>목표 보상 등급:</strong></label>
            <select id="grade-select">
                <option value="SS">SS 등급 (190점~)</option>
                <option value="S">S 등급 (130~189점)</option>
                <option value="A">A 등급 (100~129점)</option>
                <option value="B">B 등급 (70~99점)</option>
                <option value="C">C 등급 (0~69점)</option>
            </select>
            <button onclick="calculateBestCombination()">최저가 조합 찾기</button>
        </div>

        <div class="result-box" id="result-box">
            <h3>추천 조합 결과</h3>
            <div id="result-text">등급을 선택하고 버튼을 눌러주세요.</div>
        </div>
    </div>

    <script>
        // 1. 훈련석 데이터 및 임시 가격 세팅 (나중에 이 가격을 API로 업데이트)
        // '선택 안 함'은 아무 돌도 넣지 않는 경우 (비용 0, 점수 0)
        const STONES = {
            difficulty: [
                { name: "선택 안 함", score: 0, price: 0 },
                { name: "하드중급", score: 130, price: 5000000 },
                { name: "하드일반", score: 100, price: 1500000 },
                { name: "상급", score: 70, price: 200000 },
                { name: "중급", score: 50, price: 50000 }
            ],
            players: [
                { name: "선택 안 함", score: 0, price: 0 },
                { name: "4인", score: 0, price: 50000 },
                { name: "6인", score: 0, price: 30000 },
                { name: "무제한", score: -30, price: 10000 }
            ],
            party: [
                { name: "선택 안 함", score: 0, price: 0 },
                { name: "최대대미지 50%", score: 45, price: 1200000 },
                { name: "생명력 50%", score: 30, price: 500000 },
                { name: "크리티컬 확률 50%", score: 20, price: 300000 },
                { name: "생명력 70%", score: 10, price: 100000 }
                // TODO: 필요한 훈련석 종류를 여기에 모두 추가하면 됩니다.
            ],
            monster: [
                { name: "선택 안 함", score: 0, price: 0 },
                { name: "생명력 500%", score: 45, price: 2000000 },
                { name: "등장 수 200%", score: 40, price: 2500000 },
                { name: "대미지 300%", score: 30, price: 800000 },
                { name: "보호 150%", score: 25, price: 600000 },
                { name: "방어 110%", score: 10, price: 100000 }
                // TODO: 필요한 훈련석 종류를 여기에 모두 추가하면 됩니다.
            ]
        };

        // 2. 보상 등급별 점수 구간 정의
        const GRADES = {
            "SS": { min: 190, max: 9999 },
            "S":  { min: 130, max: 189 },
            "A":  { min: 100, max: 129 },
            "B":  { min: 70, max: 99 },
            "C":  { min: -9999, max: 69 }
        };

        // 3. 최저가 조합 계산
        function calculateBestCombination() {
            const targetGradeKey = document.getElementById('grade-select').value;
            const targetScoreRange = GRADES[targetGradeKey];

            let minTotalPrice = Infinity; // 가장 싼 가격을 기록할 변수 (처음엔 무한대로 설정)
            let bestCombo = null; // 가장 싼 조합을 저장할 변수

            // 4중 반복문 (모든 경우의 수를 탐색)
            for (let d of STONES.difficulty) {
                for (let pl of STONES.players) {
                    for (let pa of STONES.party) {
                        for (let m of STONES.monster) {
                            
                            // 현재 조합의 총 점수와 총 가격 계산
                            let totalScore = d.score + pl.score + pa.score + m.score;
                            let totalPrice = d.price + pl.price + pa.price + m.price;

                            // 1. 해당 점수가 목표 등급 범위 안에 들어가고
                            // 2. 지금까지 찾은 조합의 가격보다 저렴하다면 갱신!
                            if (totalScore >= targetScoreRange.min && totalScore <= targetScoreRange.max) {
                                if (totalPrice < minTotalPrice) {
                                    minTotalPrice = totalPrice;
                                    bestCombo = {
                                        difficulty: d,
                                        players: pl,
                                        party: pa,
                                        monster: m,
                                        totalScore: totalScore,
                                        totalPrice: totalPrice
                                    };
                                }
                            }
                        }
                    }
                }
            }

            // 4. 결과를 화면에 출력
            const resultDiv = document.getElementById('result-text');
            
            if (bestCombo) {
                // 골드 단위를 보기 좋게 콤마(,) 찍어주는 함수
                const formatGold = (num) => num.toLocaleString() + " G";

                resultDiv.innerHTML = `
                    <h4 style="color: #2c3e50; margin-bottom: 5px;">👑 목표 등급: ${targetGradeKey}</h4>
                    <p style="margin-top: 0;">총 점수: <strong>${bestCombo.totalScore}점</strong> / 총 예상 비용: <strong style="color: #e74c3c;">${formatGold(bestCombo.totalPrice)}</strong></p>
                    <ul>
                        <li><strong>난이도:</strong> ${bestCombo.difficulty.name} <span style="color: gray; font-size: 0.9em;">(${bestCombo.difficulty.score}점, ${formatGold(bestCombo.difficulty.price)})</span></li>
                        <li><strong>인원수:</strong> ${bestCombo.players.name} <span style="color: gray; font-size: 0.9em;">(${bestCombo.players.score}점, ${formatGold(bestCombo.players.price)})</span></li>
                        <li><strong>파티원:</strong> ${bestCombo.party.name} <span style="color: gray; font-size: 0.9em;">(${bestCombo.party.score}점, ${formatGold(bestCombo.party.price)})</span></li>
                        <li><strong>몬스터:</strong> ${bestCombo.monster.name} <span style="color: gray; font-size: 0.9em;">(${bestCombo.monster.score}점, ${formatGold(bestCombo.monster.price)})</span></li>
                    </ul>
                `;
            } else {
                resultDiv.innerHTML = `<p style="color: red;">조건을 만족하는 조합을 찾을 수 없습니다.</p>`;
            }
        }
    </script>
</body>
</html>

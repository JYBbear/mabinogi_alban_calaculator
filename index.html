<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마비노기 알반 훈련석 최저가 계산기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .control-group { margin-bottom: 20px; }
        select, .calc-btn { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        .calc-btn { background-color: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold; }
        .calc-btn:hover { background-color: #27ae60; }
        .result-box { padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: #fff; display: none; }
        #status-text { font-weight: bold; margin-bottom: 15px; font-size: 0.9em; text-align: center; white-space: pre-wrap; line-height: 1.4; }
        ul { line-height: 1.8; padding-left: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #2c3e50;">🗡️ 알반 훈련석 최저가 조합기</h1>

        <div class="control-group">
            <!-- API 키 입력칸 삭제됨 (보안 처리 완료) -->

            <label><strong>목표 보상 등급:</strong></label>
            <select id="grade-select">
                <option value="SS">SS 등급 (190점~)</option>
                <option value="S">S 등급 (130~189점)</option>
                <option value="A">A 등급 (100~129점)</option>
                <option value="B">B 등급 (70~99점)</option>
            </select>

            <label><strong>고정할 인원수 훈련석:</strong></label>
            <select id="player-select">
                <option value="선택 안 함">선택 안 함 (0점)</option>
                <option value="4인">4인 (0점)</option>
                <option value="6인">6인 (0점)</option>
                <option value="무제한">무제한 (-30점)</option>
            </select>

            <button class="calc-btn" onclick="startProcess()">가장 저렴한 조합 찾기</button>
        </div>

        <div id="status-text"></div>
        <div class="result-box" id="result-box">
            <h3 style="margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px;">추천 조합 결과</h3>
            <div id="result-text"></div>
        </div>
    </div>

    <script>
        const STONES = {
            difficulty: [
                { name: "선택 안 함", searchName: null, score: 0, price: 0 },
                { name: "하드중급", searchName: "알반 기사단의 훈련석 [난이도-하드 중급]", score: 130, price: Infinity },
                { name: "하드일반", searchName: "알반 기사단의 훈련석 [난이도-하드 일반]", score: 100, price: Infinity },
                { name: "상급", searchName: "알반 기사단의 훈련석 [난이도-상급]", score: 70, price: Infinity },
                { name: "중급", searchName: "알반 기사단의 훈련석 [난이도-중급]", score: 50, price: Infinity }
            ],
            players: [
                { name: "선택 안 함", searchName: null, score: 0, price: 0 },
                { name: "4인", searchName: "알반 기사단의 훈련석 [훈련 인원-4인]", score: 0, price: Infinity },
                { name: "6인", searchName: "알반 기사단의 훈련석 [훈련 인원-6인]", score: 0, price: Infinity },
                { name: "무제한", searchName: "알반 기사단의 훈련석 [훈련 인원-무제한]", score: -30, price: Infinity }
            ],
            party: [
                { name: "선택 안 함", searchName: null, score: 0, price: 0 },
                { name: "최대대미지 50%", searchName: "알반 기사단의 훈련석 [파티원-최대 대미지 50%]", score: 45, price: Infinity },
                
                { name: "생명력 50%", searchName: "알반 기사단의 훈련석 [파티원-생명력 50%]", score: 30, price: Infinity },
                
                { name: "생명력 회복속도 50%", searchName: "알반 기사단의 훈련석 [파티원-생명력 회복속도 50%]", score: 20, price: Infinity },
                { name: "마나 회복속도 50%", searchName: "알반 기사단의 훈련석 [파티원-마나 회복속도 50%]", score: 20, price: Infinity },
                { name: "스태미나 회복속도 50%", searchName: "알반 기사단의 훈련석 [파티원-스태미나 회복속도 50%]", score: 20, price: Infinity },
                { name: "근접 스킬 대미지 50%", searchName: "알반 기사단의 훈련석 [파티원-근접 스킬 대미지 50%]", score: 20, price: Infinity },
                { name: "마법 시전 속도 50%", searchName: "알반 기사단의 훈련석 [파티원-마법 시전 속도 50%]", score: 20, price: Infinity },
                { name: "궁수 시전 속도 50%", searchName: "알반 기사단의 훈련석 [파티원-궁수 시전 속도 50%]", score: 20, price: Infinity },
                { name: "크리티컬 확률 50%", searchName: "알반 기사단의 훈련석 [파티원-크리티컬 확률 50%]", score: 20, price: Infinity },
                { name: "최대 대미지 70%", searchName: "알반 기사단의 훈련석 [파티원-최대 대미지 70%]", score: 20, price: Infinity },
                
                { name: "생명력 회복속도 70%", searchName: "알반 기사단의 훈련석 [파티원-생명력 회복속도 70%]", score: 10, price: Infinity },
                { name: "마나 회복속도 70%", searchName: "알반 기사단의 훈련석 [파티원-마나 회복속도 70%]", score: 10, price: Infinity },
                { name: "스태미나 회복속도 70%", searchName: "알반 기사단의 훈련석 [파티원-스태미나 회복속도 70%]", score: 10, price: Infinity },
                { name: "근접 스킬 대미지 70%", searchName: "알반 기사단의 훈련석 [파티원-근접 스킬 대미지 70%]", score: 10, price: Infinity },
                { name: "마법 시전 속도 70%", searchName: "알반 기사단의 훈련석 [파티원-마법 시전 속도 70%]", score: 10, price: Infinity },
                { name: "궁수 시전 속도 70%", searchName: "알반 기사단의 훈련석 [파티원-궁수 시전 속도 70%]", score: 10, price: Infinity },
                { name: "크리티컬 확률 70%", searchName: "알반 기사단의 훈련석 [파티원-크리티컬 확률 70%]", score: 10, price: Infinity },
                { name: "생명력 70%", searchName: "알반 기사단의 훈련석 [파티원-생명력 70%]", score: 10, price: Infinity }
            ],
            monster: [
                { name: "선택 안 함", searchName: null, score: 0, price: 0 },
                { name: "생명력 500%", searchName: "알반 기사단의 훈련석 [몬스터-생명력 500%]", score: 45, price: Infinity },
                { name: "대미지 500%", searchName: "알반 기사단의 훈련석 [몬스터-대미지 500%]", score: 45, price: Infinity },

                { name: "등장 수 200%", searchName: "알반 기사단의 훈련석 [몬스터-등장 수 200%]", score: 40, price: Infinity },

                { name: "생명력 300%", searchName: "알반 기사단의 훈련석 [몬스터-생명력 300%]", score: 30, price: Infinity },
                { name: "대미지 300%", searchName: "알반 기사단의 훈련석 [몬스터-대미지 300%]", score: 30, price: Infinity },
                { name: "보호 150%", searchName: "알반 기사단의 훈련석 [몬스터-보호 150%]", score: 30, price: Infinity },

                { name: "방어 150%", searchName: "알반 기사단의 훈련석 [몬스터-방어 150%]", score: 25, price: Infinity },
                
                { name: "등장수 150%", searchName: "알반 기사단의 훈련석 [몬스터-등장수 150%]", score: 20, price: Infinity },
                { name: "보호 120%", searchName: "알반 기사단의 훈련석 [몬스터-보호 120%]", score: 20, price: Infinity },
                { name: "지력 200%", searchName: "알반 기사단의 훈련석 [몬스터-지력 200%]", score: 20, price: Infinity },
                { name: "행운 200%", searchName: "알반 기사단의 훈련석 [몬스터-행운 200%]", score: 20, price: Infinity },

                { name: "방어 120%", searchName: "알반 기사단의 훈련석 [몬스터-방어 120%]", score: 15, price: Infinity },
                { name: "지력 150%", searchName: "알반 기사단의 훈련석 [몬스터-지력 150%]", score: 15, price: Infinity },
                { name: "행운 150%", searchName: "알반 기사단의 훈련석 [몬스터-행운 150%]", score: 15, price: Infinity },

                { name: "생명력 150%", searchName: "알반 기사단의 훈련석 [몬스터-생명력 150%]", score: 10, price: Infinity },
                { name: "대미지 150%", searchName: "알반 기사단의 훈련석 [몬스터-대미지 150%]", score: 10, price: Infinity },
                { name: "보호 110%", searchName: "알반 기사단의 훈련석 [몬스터-보호 110%]", score: 10, price: Infinity },
                { name: "방어 110%", searchName: "알반 기사단의 훈련석 [몬스터-방어 110%]", score: 10, price: Infinity },
                { name: "지력 120%", searchName: "알반 기사단의 훈련석 [몬스터-지력 120%]", score: 10, price: Infinity },
                { name: "행운 120%", searchName: "알반 기사단의 훈련석 [몬스터-행운 120%]", score: 10, price: Infinity },
            ]
        };

        const GRADES = {
            "SS": { min: 190, max: 9999 }, "S":  { min: 130, max: 189 }, "A":  { min: 100, max: 129 }, "B":  { min: 70, max: 99 }
        };

        // 직접 넥슨을 찌르지 않고, 백엔드(/api/search)를 호출함
        async function fetchLowestPrice(itemName) {
            const targetUrl = `/api/search?itemName=${encodeURIComponent(itemName)}`;
            
            let response;
            try {
                response = await fetch(targetUrl);
            } catch (networkError) {
                throw new Error(`[네트워크 오류] 서버에 연결할 수 없습니다.\n상세: ${networkError.message}`);
            }

            const data = await response.json();

            if (!response.ok || data.error) {
                const httpCode = response.status;
                const nexonCode = data.error ? data.error.name : '알 수 없음';
                const nexonMsg = data.error ? data.error.message : '알 수 없는 서버 오류입니다.';
                throw new Error(`[응답코드: ${httpCode}] [오류코드: ${nexonCode}]\n상세 내용: ${nexonMsg}`);
            }
            
            if (data.auction_item && data.auction_item.length > 0) {
                let minPrice = Infinity;
                data.auction_item.forEach(item => {
                    if(item.auction_price_per_unit < minPrice) {
                        minPrice = item.auction_price_per_unit;
                    }
                });
                return minPrice;
            } else {
                return Infinity; // 매물 없음
            }
        }

        async function startProcess() {
            const statusText = document.getElementById('status-text');
            const resultBox = document.getElementById('result-box');
            const selectedPlayerName = document.getElementById('player-select').value;
            
            resultBox.style.display = 'none';
            statusText.style.color = '#2980b9';

            // 선택된 인원수 훈련석 추출
            const selectedPlayerStone = STONES.players.find(p => p.name === selectedPlayerName);

            try {
                // 인원수 훈련석 가격 우선 조회 (선택한 경우)
                if (selectedPlayerStone.searchName) {
                    statusText.innerText = `🔍 경매장 조회 중...\n[ ${selectedPlayerStone.name} ]`;
                    selectedPlayerStone.price = await fetchLowestPrice(selectedPlayerStone.searchName);
                }

                // 나머지 카테고리(난이도, 파티, 몬스터) 가격 조회
                const targetCategories = ['difficulty', 'party', 'monster'];
                for (let category of targetCategories) {
                    for (let stone of STONES[category]) {
                        if (stone.searchName) {
                            statusText.innerText = `🔍 경매장 조회 중...\n[ ${stone.name} ]`;
                            stone.price = await fetchLowestPrice(stone.searchName);
                            await new Promise(r => setTimeout(r, 150)); // API 호출 속도 조절
                        }
                    }
                }
                
                statusText.innerText = '✅ 모든 가격 데이터 조회 완료!';
                statusText.style.color = '#27ae60';
                calculateBestCombination(selectedPlayerStone);
                resultBox.style.display = 'block';

            } catch (error) {
                console.error(error);
                statusText.style.color = '#c0392b';
                statusText.innerText = `❌ 오류가 발생했습니다.\n\n${error.message}`;
            }
        }

        function calculateBestCombination(selectedPlayerStone) {
            const targetGradeKey = document.getElementById('grade-select').value;
            const targetScoreRange = GRADES[targetGradeKey];
            let minTotalPrice = Infinity;
            let bestCombo = null;

            // 인원수는 선택한 것으로 고정하고 나머지 3개 카테고리만 조합 (루프 간소화)
            for (let d of STONES.difficulty) {
                for (let pa of STONES.party) {
                    for (let m of STONES.monster) {
                        let totalScore = d.score + selectedPlayerStone.score + pa.score + m.score;
                        let totalPrice = d.price + selectedPlayerStone.price + pa.price + m.price;

                        if (totalScore >= targetScoreRange.min && totalScore <= targetScoreRange.max) {
                            if (totalPrice < minTotalPrice) {
                                minTotalPrice = totalPrice;
                                bestCombo = { difficulty: d, players: selectedPlayerStone, party: pa, monster: m, totalScore, totalPrice };
                            }
                        }
                    }
                }
            }

            const resultDiv = document.getElementById('result-text');
            const formatGold = (num) => num === Infinity ? "매물 없음" : num.toLocaleString() + " G";

            if (bestCombo && bestCombo.totalPrice !== Infinity) {
                resultDiv.innerHTML = `
                    <h4 style="color: #2980b9; margin-bottom: 5px;">🎯 목표 등급: ${targetGradeKey}</h4>
                    <p style="margin-top: 0; font-size: 1.1em;">
                        총 획득 점수: <strong>${bestCombo.totalScore}점</strong><br>
                        총 예상 비용: <strong style="color: #e74c3c; font-size: 1.2em;">${formatGold(bestCombo.totalPrice)}</strong>
                    </p>
                    <ul>
                        <li><strong>난이도:</strong> ${bestCombo.difficulty.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(bestCombo.difficulty.price)})</span></li>
                        <li><strong>인원수 (고정):</strong> ${bestCombo.players.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(bestCombo.players.price)})</span></li>
                        <li><strong>파티원:</strong> ${bestCombo.party.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(bestCombo.party.price)})</span></li>
                        <li><strong>몬스터:</strong> ${bestCombo.monster.name} <span style="color: gray; font-size: 0.9em;">(${formatGold(bestCombo.monster.price)})</span></li>
                    </ul>
                `;
            } else {
                resultDiv.innerHTML = `<p style="color: red; font-weight: bold;">조건을 만족하는 매물이 현재 경매장에 부족합니다.</p>`;
            }
        }
    </script>
</body>
</html>
